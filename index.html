<!DOCTYPE html>
<html lang="qr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAQ | Biometrika</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .container { position: relative; width: 100%; max-width: 400px; height: 80vh; display: flex; align-items: center; justify-content: center; }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Banklardagi kabi Oval Maska */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Atrof qorong'u */
            mask: radial-gradient(ellipse 60% 50% at 50% 50%, transparent 100%, black 100%);
            -webkit-mask: radial-gradient(ellipse 150px 220px at 50% 50%, transparent 95%, black 100%);
            pointer-events: none;
        }

        /* Oval chegarasi (Yashil chiziq) */
        .face-border {
            position: absolute; top: 50%; left: 50%;
            width: 300px; height: 440px;
            border: 2px solid #00f2fe; border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }

        .controls { position: absolute; bottom: 30px; width: 90%; }
        
        button {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: white; border: none; padding: 18px; border-radius: 12px;
            font-size: 18px; font-weight: bold; width: 100%; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        #status { font-size: 14px; margin-top: 15px; color: #aaa; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay"></div>
        <div class="face-border"></div>
    </div>

    <div class="controls">
        <button id="capture">📷 JÜZDI TASTIQLAW</button>
        <p id="status">Kamera tayarlanbaqta...</p>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('capture');
        const status = document.getElementById('status');

        tg.expand();

        // Kamera sozlamalarini maksimal sifatga qo'yamiz
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                status.innerText = "Tayar. Júzińizdi oval ishine keltiriń.";
            } catch (err) {
                status.innerText = "Kameraǵa ruxsat berilmedi!";
                console.error(err);
            }
        }

        btn.onclick = () => {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            // Rasm sifatini 0.9 (90%) qildik
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            tg.sendData(JSON.stringify({ image: imageData }));
            tg.close();
        };

        startCamera();
    </script>
</body>
</html>
