<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAQ - Davamat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { text-align: center; background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 15px; border: 2px solid #00f2fe; box-shadow: 0 0 15px #00f2fe; }
        button { background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; padding: 15px 30px; border-radius: 10px; font-size: 18px; border: none; width: 100%; max-width: 400px; margin-top: 20px; font-weight: bold; }
        #status { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>HAQ Skaner</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button id="capture">📷 JÜZDI SKANERLEW</button>
    <p id="status">Kamera júklenmekte...</p>

    <script>
        const tg = window.Telegram.WebApp;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('capture');
        const status = document.getElementById('status');

        tg.expand();

        // Kamerani ochish (facingMode: user)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { 
                video.srcObject = stream; 
                status.innerText = "Kamera tayar. Júzıńizdi orayǵa qaratıń.";
            })
            .catch(err => { status.innerText = "Kameraǵa ruxsat berılmedı!"; });

        btn.onclick = () => {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            tg.sendData(JSON.stringify({ image: imageData }));
            tg.close();
        };
    </script>
</body>
</html>
